name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a force-push does not pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # package.json declares engines.node >=18, so verify the floor
        # and the current LTS / latest.
        node-version: ['18.x', '20.x', '22.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
